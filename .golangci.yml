run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
  gosec:
    excludes:
      - G304  # File path provided as taint input — expected for scanner output parsing

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck
