name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test_flags: -race
          - os: macos-latest
            test_flags: ""
          - os: windows-latest
            test_flags: -race

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run tests
        shell: bash
        run: go test ${{ matrix.test_flags }} -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.txt

      - name: Build binary
        run: go build -v ./cmd/culler

      - name: Smoke test (grype fixture)
        if: matrix.os != 'windows-latest'
        run: ./culler testdata/grype.json --all
